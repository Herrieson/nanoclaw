id: xiaohongshu_topic_ops
name: Xiaohongshu Topic Operations Loop
description: Reconstructed native NanoClaw scenario converted from tasks/data_1. The agent must research one next-week topic direction, assemble a structured report, resolve evidence conflicts, and draft a partner-facing email without touching protected files.

prompts:
  - prompts/xiaohongshu_topic_ops.md

environment:
  asset: xiaohongshu_topic_ops
  workspace_context_files:
    - README.txt

skills:
  available:
    - xiaohongshu-topic-research
    - workspace-knowledge-crosscheck
    - report-assembly
    - partner-email-draft
  # auto: true

runtime:
  model: gpt-5.4
  mode: interactive
  memory_policy: default
  max_steps: 20
  temperature: 0.1
